# Name of your application. Used to uniquely configure containers.
service: lookbook

# Name of the container image.
image: maglevhq/lookbook

# Deploy to these servers.
servers:
  web:
    - 46.225.155.76

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Remove this section when using multiple web servers and ensure you terminate SSL at your load balancer.
#
# Note: If using Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
proxy:
  ssl: true
  host: uikit.maglev.dev
  # Puma listens on 3000 (see lookbook_host/config/puma.rb).
  app_port: 3000

# Credentials for your image host.
registry:
  server: localhost:5555

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Configure builder setup.
#
# The image Dockerfile lives under lookbook_host/ but COPY expects the **engine repo root**
# (spec/components/previews, maglevcms path: "..", etc.). Set context to that root.
#
# Run Kamal from `lookbook_host/` (same as local `docker build -f lookbook_host/Dockerfile .` from repo root):
#   cd lookbook_host && kamal deploy
#
# If you prefer `kamal deploy` from the repo root instead, use:
#   builder: { arch: amd64, context: ., dockerfile: lookbook_host/Dockerfile }
builder:
  arch: amd64
  context: ..
  dockerfile: Dockerfile
  # Pass in additional build args needed for your Dockerfile.
  # args:
  #   RUBY_VERSION: <%= ENV["RBENV_VERSION"] || ENV["rvm_ruby_string"] || "#{RUBY_ENGINE}-#{RUBY_ENGINE_VERSION}" %>

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - SECRET_KEY_BASE
