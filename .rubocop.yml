require: rubocop-rails

# Yeah, sorry
Style/HashLikeCase:
  Enabled: true

Style/StringHashKeys:
  Enabled: true
  # lookbook_host/config/routes.rb: hash-rocket routes are rewritten into `get up: '...'`, which breaks `/up`.
  # maglevcms.gemspec: RubyGems requires spec.metadata keys to be Strings, not Symbols.
  Exclude:
    - "lookbook_host/config/routes.rb"
    - "maglevcms.gemspec"

# Same autocorrect interaction as Style/StringHashKeys for route hashes.
Style/HashSyntax:
  Exclude:
    - "lookbook_host/config/routes.rb"
    - "maglevcms.gemspec"

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: single_quotes

Metrics/BlockLength:
  Exclude:
    - "Rakefile"
    - "**/*.rake"
    - "spec/**/*.rb"

Documentation:
  Enabled: false

Lint/MissingSuper:
  Exclude:
    - "app/components/maglev/uikit/**/*.rb"
    - "app/components/maglev/editor/**/*.rb"

AllCops:
  TargetRubyVersion: 3.0
  Exclude:
    - "bin/*"
    - "coverage/**/*"
    - "db/**/*"
    - "log"
    - "node_modules/**/*"
    - "public/**/*"
    - "spec/dummy/db/schema.rb"
    - "lookbook_host/db/schema.rb"
    - "storage/**/*"
    - "tmp/**/*"
    - "vendor/**/*"
    - "Guardfile"
